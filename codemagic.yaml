workflows:
  ios-workflow:
    name: Build iOS app
    max_build_duration: 90
    environment:
      node: 20.0.0
      xcode: latest
      vars:
        DEVELOPMENT_TEAM: "TDX9734X95"
    scripts:
      - name: Debug environment
        script: |
          echo "=== DEBUG PATH ==="
          pwd
          ls -la
      - name: Install dependencies
        script: |
          npm ci
          npm install @capacitor/ios
      - name: Clean previous web build
        script: |
          rm -rf www
          echo "Cleaned www directory"
      - name: Build web assets
        script: |
          npx ionic build --prod
          echo "Web assets built in www"
      - name: Copy web assets to iOS
        script: |
          npx cap copy ios
          echo "Copied web assets to iOS platform"
      - name: Sync iOS platform
        script: |
          npx cap sync ios
          echo "iOS platform synced"
      - name: Build iOS app with Xcode (archive)
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            archive \
            -archivePath $CM_BUILD_DIR/build/App.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            -allowProvisioningUpdates
          echo "iOS app archived to $CM_BUILD_DIR/build/App.xcarchive"

publishing:
  app_store_connect:
    auth: integration
    issuer_id: 35c6e464-0d94-481d-8d44-2c9849bbca91
    key_id: 677URXPXN9
    bundle_id: "com.daniele.sivapp"
    submit_to_testflight: true

artifacts:
  - build/App.xcarchive
