workflows:
  ios-sivapp-testflight:
    name: Sivapp - iOS Build e TestFlight
    instance_type: mac_mini_m1
    max_build_duration: 120
    
    environment:
      vars:
        # Configurazione specifica per Sivapp
        BUNDLE_ID: "com.daniele.sivapp"
        APP_NAME: "Sivapp"
        
        # Team ID dal tuo Apple Developer
        APPLE_TEAM_ID: "TDX9734X95"
        
        # Configurazione Xcode
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        
        # Node.js version
        NODE_VERSION: "18"
        
      # Versioni software
      xcode: latest
      node: $NODE_VERSION
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - node_modules
        - $HOME/.npm
        - $HOME/.gradle/caches

    scripts:
      - name: Install Node.js dependencies
        script: |
          echo "📦 Installando dipendenze Node.js..."
          npm ci

      - name: Build Ionic application
        script: |
          echo "🔨 Building Sivapp per produzione..."
          npm run build
          
      - name: Add iOS platform (se non esiste)
        script: |
          echo "📱 Configurando piattaforma iOS..."
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor with iOS
        script: |
          echo "🔄 Sincronizzando Capacitor con iOS..."
          npx cap sync ios

      - name: Install CocoaPods dependencies  
        script: |
          echo "📦 Installando dipendenze CocoaPods..."
          cd ios/App
          pod install

      - name: Set up automatic code signing
        script: |
          echo "🔐 Configurando code signing automatico..."
          # CodeMagic gestirà automaticamente i certificati con l'App Store Connect Integration
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          echo "🚀 Building Sivapp.ipa..."
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --config "Release"

    # File generati dal build
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/Release-iphoneos/*.app

    # Pubblicazione su TestFlight
    publishing:
      app_s
