workflows:
  ios-workflow:
    name: Build iOS app
    max_build_duration: 90
    environment:
      node: 20.0.0
      xcode: latest
    scripts:
      - "npm install"
      - "npm install @capacitor/ios"
      - "npx ionic build"
      - "npx cap copy ios"
      - "npx cap sync ios"
      - |
        xcodebuild -workspace ios/App/App.xcworkspace \
          -scheme App \
          -sdk iphoneos \
          -configuration Release \
          archive \
          -archivePath $CM_BUILD_DIR/build/App.xcarchive \
          DEVELOPMENT_TEAM=TDX9734X95 \
          CODE_SIGN_STYLE=Automatic

publishing:
  app_store_connect:
    auth: integration
    api_key_path: /Users/builder/.codemagic/apple_api_keys/ChiaveCodemagic.p8
    issuer_id: 35c6e464-0d94-481d-8d44-2c9849bbca91
    key_id: 677URXPXN9
    bundle_id: com.daniele.sivapp
    submit_to_testflight: true
    artifacts:
      - build/App.xcarchive
